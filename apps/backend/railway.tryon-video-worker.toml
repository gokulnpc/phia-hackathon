# Deploy as a separate Railway service (same image as mirror-api).
# Required env: DATABASE_URL, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY,
# GEMINI_API_KEY, and optionally GEMINI_VIDEO_MODEL (defaults to
# veo-3.1-fast-generate-preview when unset).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "mirror-tryon-video-worker"
restartPolicyType = "ON_FAILURE"
