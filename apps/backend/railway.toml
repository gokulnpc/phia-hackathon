# Railway config-as-code: https://docs.railway.com/reference/config-as-code
#
# In the Railway dashboard, set this service’s root directory to `apps/backend`
# (monorepo) so this file and the Dockerfile are used.
#
# Do not set deploy.healthcheckPath here: optional worker services reuse the same
# root and do not serve HTTP. For mirror-api only, set GET /health in Railway →
# Settings → Deploy (health check path).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
